<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cerebral Misfire</title>

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/android-chrome-512x512.png"
    />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Matomo -->
    <script>
      var _paq = window._paq = window._paq || [];
      /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
      _paq.push(['trackPageView']);
      _paq.push(['enableLinkTracking']);
      (function() {
        var u="https://matomo.cerebralmisfire.net/";
        _paq.push(['setTrackerUrl', u+'matomo.php']);
        _paq.push(['setSiteId', '9']);
        var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
        g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
      })();
    </script>
    <!-- End Matomo Code -->

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      :root {
        --text-color: #000;
        --text-dim: #333;
        --bg: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg);
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative; /* for positioning caption */
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        color: var(--text-color);
      }

      img {
        max-width: 90%;
        height: auto;
      }

      .codeberg-link {
        position: absolute;
        top: 20px;
        right: 20px;
        font-size: 2rem;
        color: var(--text-color);
        text-decoration: none;
        transition: color 0.2s ease;
        line-height: 1;
      }

      .codeberg-link:hover {
        color: var(--text-dim);
      }

      .codeberg-link img {
        width: 2rem;
        height: 2rem;
      }

      /* Bottom-left caption */
      .caption {
        position: absolute;
        left: 20px;
        bottom: 20px;
        font-size: 0.95rem;
        background: rgba(
          255,
          255,
          255,
          0.7
        ); /* subtle legibility boost on light images */
        padding: 6px 10px;
        border-radius: 10px;
        backdrop-filter: blur(4px);
      }

      .caption a {
        color: inherit;
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .caption a:hover {
        color: var(--text-dim);
      }

      .main-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2.5rem;
      }

      .folio-section {
        display: flex;
        align-items: center;
        gap: 1.25rem;
        max-width: 900px;
      }

      .folio-section img {
        width: auto;
        height: 100px;
        flex-shrink: 0;
      }

      .folio-section p {
        margin: 0;
        font-size: 0.95rem;
        color: var(--text-dim);
        line-height: 1.5;
      }

      @media (max-width: 480px) {
        .codeberg-link {
          font-size: 1.6rem;
          top: 14px;
          right: 14px;
        }
        .caption {
          left: 14px;
          bottom: 14px;
          font-size: 0.9rem;
          padding: 5px 8px;
        }
        .folio-section {
          flex-direction: column;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <a
      href="https://codeberg.org/cerebralmisfire"
      class="codeberg-link"
      target="_blank"
      rel="noopener"
    >
      <img src="images/codeberg.svg" alt="" aria-hidden="true" />
      <span class="sr-only">Cerebral Misfire on Codeberg</span>
    </a>

    <div class="main-content">
      <img src="images/logo.png" alt="Cerebral Misfire" />

      <div class="folio-section">
        <img src="images/folio.svg" alt="Folio" />
        <p><strong>COMING IN 2026:</strong> A self-hosted web application for following academic journals, collecting articles, and building a personal research feed named <i>Folio</i>.</p>
      </div>
    </div>

    <div class="caption">
      The nerd side of
      <a
        href="https://academic.coffee"
        target="_blank"
        rel="noopener noreferrer"
        >academic.coffee</a
      >
      | <a href="https://slowerasure.phd" target="_blank">slowerasure.phd</a> |
      <a href="https://exhaustion.space" target="_blank">exhaustion.space</a>
    </div>
  </body>
</html>
